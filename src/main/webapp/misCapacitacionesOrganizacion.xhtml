<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">

    <h:head>
        <title>Capacitaciones</title>
    </h:head>

    <style>
        .contenedor-video {
            width: 320px;
            height: 180px;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenedor-video img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .capacitacion-card {
            width: 55rem;
            height: auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: row;
            align-items: center;
            background: white;
            gap: 20px;
        }

        .info-capacitacion {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .etiquetas {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .titulo {
            font-size: 20px;
            font-weight: bold;
            color: #007bff;
        }

        .descripcion {
            font-size: 16px;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
    </style>

    <body style="background-color: #f2f2f2; color: black; display: flex; flex-direction: column; align-items: center;">
        <h:form id="formCapacitaciones">

            <div style="margin-top: 60px;"></div>

            <div style="display: flex; flex-direction: column; align-items: center; overflow-y: auto; gap: 15px;">
                <ui:repeat value="#{capacitacionController.listaCapacitaciones}" var="capacitacion">
                    <div class="capacitacion-card">


                        <div class="contenedor-video">
                            <p:graphicImage value="https://img.youtube.com/vi/#{capacitacion.urlVideo.split('v=')[1]}/hqdefault.jpg" alt="Portada del video"/>
                        </div>


                        <div class="info-capacitacion">
                            <p:outputLabel styleClass="titulo" value="#{capacitacion.titulo}"/>
                            <p:outputLabel styleClass="descripcion" value="#{capacitacion.descripcion}"/>

                            <div class="etiquetas">
                                <p:chip icon="pi pi-calendar" style="background-color: #28a745; color: white;" label="Fecha: #{capacitacion.fechaPublicacion}"/>
                                <p:chip icon="pi pi-users" style="background-color: #007bff; color: white;" label="#{capacitacion.categoria}"/>
                            </div>
                            <div
                            style="display: flex; flex-direction: column;justify-content: flex-end; margin-top: 20px">
                            <p:commandButton value="Ver mi capacitacion" icon="pi pi-play"
                                             onclick="window.open('#{capacitacion.urlVideo}', '_blank')"/>
                             </div>
                        </div>

                    </div>
                </ui:repeat>
            </div>

        </h:form>
    </body>
</html>
